layout: null

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.title | default: "Josh Pollock" }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fff;
      color: #333;
      font-family: "Cormorant Garamond", Georgia, "Times New Roman", serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .splash-quote {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-style: italic;
      font-weight: 300;
      letter-spacing: 0.02em;
      opacity: 0;
      transform: translateY(40px);
      animation: rise-in 3.5s cubic-bezier(0.25, 0.1, 0.25, 0.85) 0.3s forwards;
    }

    .splash-enter {
      margin-top: 2rem;
      font-size: 1.25rem;
      opacity: 0;
      pointer-events: none;
      animation: fade-in 1s ease-out 5.5s forwards;
    }

    .splash-enter a {
      color: #333;
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 0, 0, 0.3);
      padding-bottom: 2px;
      transition: border-color 0.3s;
    }

    .splash-enter a:hover {
      border-color: #333;
    }

    .splash-leave {
      margin-top: 1rem;
      font-size: 1.25rem;
      opacity: 0;
      pointer-events: none;
      animation: fade-in 1s ease-out 7.5s forwards;
    }

    .splash-leave a {
      color: #333;
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 0, 0, 0.3);
      padding-bottom: 2px;
      transition: border-color 0.3s;
      cursor: pointer;
    }

    .splash-leave a:hover {
      border-color: #333;
    }

    .splash-skip {
      position: fixed;
      bottom: 2rem;
      font-size: 0.75rem;
      color: rgba(0, 0, 0, 0.25);
      opacity: 0;
      animation: fade-in 1s ease-out 1s forwards;
    }

    @keyframes rise-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fade-in {
      to {
        opacity: 1;
        pointer-events: auto;
      }
    }
  </style>
</head>
<body>
  <div class="splash-quote">What would love do now?</div>
  <div class="splash-enter"><a href="/index/">Enter?</a></div>
  <div class="splash-leave"><a href="javascript:history.back()">Leave?</a></div>
  <div class="splash-skip">press enter to skip</div>

  <script>
    document.addEventListener("keydown", function (e) {
      if (e.code === "Enter") {
        e.preventDefault();
        window.location.href = "/index/";
      }
    });

  </script>
</body>
</html>
